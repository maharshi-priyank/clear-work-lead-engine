app = "clearwork-leads-engine"
primary_region = "sin"   # Singapore — closest available to Supabase ap-south-1

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
